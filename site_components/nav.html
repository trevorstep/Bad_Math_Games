<!-- Login/Signup Modal -->
<div id="authModal" style="display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.4);">
    <div style="background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 80%; max-width: 400px; text-align: center; border-radius: 8px;">
        <span class="closeButton" style="color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer;">&times;</span>
        <h2>Login / Sign Up</h2>
        <form id="authForm">
            <input type="text" id="authUsername" placeholder="Username (Sign Up Only)" style="width: 90%; padding: 10px; margin: 8px auto; border: 1px solid #ddd; border-radius: 4px;" autocomplete="username">
            <input type="email" id="authEmail" placeholder="Email" style="width: 90%; padding: 10px; margin: 8px auto; border: 1px solid #ddd; border-radius: 4px;" autocomplete="email">
            <input type="password" id="authPassword" placeholder="Password" style="width: 90%; padding: 10px; margin: 8px auto; border: 1px solid #ddd; border-radius: 4px;" autocomplete="current-password">
            <button type="button" id="signInButton" style="background-color: #4CAF50; color: white; padding: 10px 20px; margin: 8px 5px; border: none; cursor: pointer; border-radius: 4px;">Sign In</button>
            <button type="button" id="signUpButton" style="background-color: #008CBA; color: white; padding: 10px 20px; margin: 8px 5px; border: none; cursor: pointer; border-radius: 4px;">Sign Up</button>
            <p id="authError" style="color: red; margin-top: 10px;"></p>
        </form>
    </div>
</div>
